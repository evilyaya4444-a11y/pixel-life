<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素诗·万物有灵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            background: #1a0f2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 0, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 1;
        }
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, #1a0f2a 100%);
            pointer-events: none;
            z-index: 1;
        }
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: #2a1a3a;
            border: 4px solid #ff00ff;
            box-shadow: 0 0 0 4px #00ffff, 0 0 20px #ff00ff;
            padding: 24px;
            position: relative;
            z-index: 2;
            image-rendering: pixelated;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #1a0f2a;
            border: 4px solid #00ffff;
            margin-bottom: 24px;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff00ff;
        }
        .badge {
            background: #ff00ff;
            color: #ffff00;
            padding: 8px 16px;
            border: 2px solid #00ffff;
            font-size: 12px;
            text-shadow: 1px 1px 0 #000000;
        }
        .exp-bar {
            background: #1a0f2a;
            height: 16px;
            width: 140px;
            border: 2px solid #00ffff;
            position: relative;
        }
        .exp-fill {
            height: 100%;
            width: 0%;
            background: #ffff00;
            box-shadow: 0 0 10px #ffff00;
            transition: width 0.3s steps(10);
        }
        .stats-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .attrs-panel {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: #1a0f2a;
            border: 4px solid #ff00ff;
            padding: 16px;
        }
        .memory-panel {
            flex: 1;
            min-width: 100px;
            background: #1a0f2a;
            border: 4px solid #00ffff;
            padding: 16px;
            text-align: center;
            position: relative;
        }
        .memory-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, #ff00ff22, #00ffff22 8px);
            pointer-events: none;
        }
        .attr-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a1a3a;
            padding: 8px;
            border: 2px solid #00ffff;
        }
        .attr-name {
            color: #ffff00;
            font-size: 10px;
            width: 45px;
            text-shadow: 1px 1px 0 #ff00ff;
        }
        .attr-value {
            color: #00ffff;
            font-size: 12px;
            background: #1a0f2a;
            padding: 4px 8px;
            border: 2px solid #ff00ff;
            text-shadow: 1px 1px 0 #ffff00;
        }
        .memory-icon {
            font-size: 20px;
        }
        .memory-count {
            font-size: 20px;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff00ff;
        }
        .dice-panel {
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #00ffff;
            text-shadow: 1px 1px 0 #ff00ff;
        }
        .dice-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ff00ff);
        }
        .dice-bonus {
            color: #ffff00;
            font-size: 16px;
        }
        .story-card {
            background: #1a0f2a;
            border: 4px solid #ff00ff;
            padding: 32px;
            margin: 20px 0;
            position: relative;
            box-shadow: 8px 8px 0 #00ffff;
        }
        .story-title {
            font-size: 20px;
            color: #ffff00;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #ff00ff;
            line-height: 1.5;
        }
        .story-desc {
            color: #00ffff;
            margin-bottom: 28px;
            font-size: 12px;
            line-height: 1.8;
            padding: 16px;
            background: #2a1a3a;
            border: 2px solid #ffff00;
        }
        .choices-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .choice-btn {
            background: #2a1a3a;
            border: 4px solid #00ffff;
            color: #ffff00;
            padding: 16px;
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 #ff00ff;
            text-shadow: 1px 1px 0 #000000;
            line-height: 1.5;
        }
        .choice-btn:hover {
            background: #3a2a4a;
            border-color: #ffff00;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ff00ff;
        }
        .choice-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #ff00ff;
        }
        .dice-result {
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 20px;
            margin-top: 24px;
            color: #00ffff;
            font-size: 12px;
            text-align: center;
            animation: pixelDice 0.3s steps(5);
        }
        @keyframes pixelDice {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            50% { transform: scale(1.1); filter: hue-rotate(90deg); }
            100% { transform: scale(1); filter: hue-rotate(0deg); }
        }
        .dice-number {
            font-size: 48px;
            color: #ffff00;
            text-shadow: 4px 4px 0 #ff00ff;
            margin: 10px 0;
        }
        .timeline {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 16px 0;
            margin: 10px 0;
        }
        .timeline-dot {
            min-width: 40px;
            height: 40px;
            background: #1a0f2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #ffff00;
            border: 2px solid #ff00ff;
            cursor: pointer;
            image-rendering: pixelated;
        }
        .timeline-dot.lucky {
            background: #ffff00;
            color: #ff00ff;
            border-color: #00ffff;
        }
        .timeline-dot.success {
            background: #00ffff;
            color: #ff00ff;
            border-color: #ffff00;
        }
        .timeline-dot.failure {
            background: #ff00ff;
            color: #ffff00;
            border-color: #00ffff;
        }
        .memory-screen {
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 24px;
            margin: 20px 0;
        }
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin: 24px 0;
            max-height: 600px;
            overflow-y: auto;
            padding: 12px;
        }
        .category-title {
            font-size: 16px;
            color: #ffff00;
            margin: 30px 0 15px 0;
            padding: 10px 0;
            border-bottom: 4px solid #ff00ff;
            text-shadow: 2px 2px 0 #ff00ff;
            grid-column: 1 / -1;
        }
        .category-title:first-of-type {
            margin-top: 0;
        }
        .memory-card {
            background: #2a1a3a;
            border: 4px solid #00ffff;
            padding: 20px 12px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 #ff00ff;
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .memory-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ff00ff;
            border-color: #ffff00;
        }
        .memory-card.selected {
            border-color: #ffff00;
            background: #3a2a4a;
            box-shadow: 0 0 0 2px #ffff00;
        }
        .memory-card.locked {
            opacity: 0.5;
            border-color: #666;
            cursor: not-allowed;
        }
        .memory-card.locked:hover {
            transform: none;
            box-shadow: 4px 4px 0 #ff00ff;
        }
        .memory-card .emoji {
            font-size: 36px;
            margin-bottom: 12px;
        }
        .memory-card .name {
            font-size: 12px;
            color: #ffff00;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .memory-card .desc {
            font-size: 8px;
            color: #00ffff;
            line-height: 1.4;
        }
        button.primary {
            background: #ff00ff;
            border: none;
            color: #ffff00;
            padding: 16px 32px;
            font-size: 14px;
            cursor: pointer;
            border: 4px solid #00ffff;
            box-shadow: 4px 4px 0 #ffff00;
            text-shadow: 2px 2px 0 #000000;
            margin: 10px 5px;
        }
        button.primary:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ffff00;
        }
        button.primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.secondary {
            background: #00ffff;
            border: none;
            color: #ff00ff;
            padding: 16px 32px;
            font-size: 14px;
            cursor: pointer;
            border: 4px solid #ffff00;
            box-shadow: 4px 4px 0 #ff00ff;
            text-shadow: 2px 2px 0 #000000;
        }
        button.secondary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ff00ff;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 16px 32px;
            color: #00ffff;
            z-index: 1000;
            animation: slideDown 0.5s steps(10);
            text-shadow: 1px 1px 0 #ff00ff;
            box-shadow: 8px 8px 0 #ff00ff;
            font-size: 12px;
        }
        @keyframes slideDown {
            0% { top: -100px; opacity: 0; }
            100% { top: 20px; opacity: 1; }
        }
        .welcome-screen {
            text-align: center;
            padding: 20px 20px;
        }
        .welcome-title {
            font-size: 32px;
            color: #ffff00;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 #ff00ff, 8px 8px 0 #00ffff;
            line-height: 1.5;
        }
        .welcome-subtitle {
            font-size: 14px;
            color: #00ffff;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #ff00ff;
        }
        .disco-light {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                #ff00ff22,
                #00ffff22 20px,
                #ffff0022 40px
            );
            animation: discoMove 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes discoMove {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }
    </style>
</head>
<body>
    <div class="disco-light"></div>
    <div class="game-container" id="gameRoot"></div>

<script>
(function() {
    // ============================================================
    // 复古DISCO音效系统
    // ============================================================
    const AudioSystem = {
        context: null,
        enabled: true,
        
        init() {
            try {
                this.context = new (window.AudioContext || window.webkitAudioContext)();
                this.enabled = false;
            } catch (e) {
                this.enabled = false;
            }
        },
        
        enable() {
            this.enabled = true;
            this.playDiscoBeat();
        },
        
        playDiceRoll() {
            if (!this.enabled || !this.context) return;
            const now = this.context.currentTime;
            for (let i = 0; i < 5; i++) {
                const osc = this.context.createOscillator();
                const gain = this.context.createGain();
                osc.type = 'square';
                osc.frequency.value = 440 + i * 100;
                gain.gain.value = 0.05;
                osc.connect(gain);
                gain.connect(this.context.destination);
                gain.gain.setValueAtTime(0.05, now + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.1);
                osc.start(now + i * 0.05);
                osc.stop(now + i * 0.05 + 0.1);
            }
        },
        
        playSuccess() {
            if (!this.enabled || !this.context) return;
            const now = this.context.currentTime;
            const freqs = [523.25, 659.25, 783.99];
            freqs.forEach((freq, i) => {
                const osc = this.context.createOscillator();
                const gain = this.context.createGain();
                osc.type = 'sawtooth';
                osc.frequency.value = freq;
                gain.gain.value = 0.08;
                osc.connect(gain);
                gain.connect(this.context.destination);
                gain.gain.setValueAtTime(0.08, now + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.3);
                osc.start(now + i * 0.05);
                osc.stop(now + i * 0.05 + 0.3);
            });
        },
        
        playLucky() {
            if (!this.enabled || !this.context) return;
            const now = this.context.currentTime;
            for (let octave = 0; octave < 3; octave++) {
                for (let i = 0; i < 4; i++) {
                    const osc = this.context.createOscillator();
                    const gain = this.context.createGain();
                    osc.type = 'square';
                    osc.frequency.value = 440 * Math.pow(2, octave) * (1 + i * 0.25);
                    gain.gain.value = 0.03;
                    osc.connect(gain);
                    gain.connect(this.context.destination);
                    gain.gain.setValueAtTime(0.03, now + octave * 0.1 + i * 0.025);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + octave * 0.1 + i * 0.025 + 0.15);
                    osc.start(now + octave * 0.1 + i * 0.025);
                    osc.stop(now + octave * 0.1 + i * 0.025 + 0.15);
                }
            }
        },
        
        playMemory() {
            if (!this.enabled || !this.context) return;
            const now = this.context.currentTime;
            const osc = this.context.createOscillator();
            const gain = this.context.createGain();
            osc.type = 'triangle';
            osc.frequency.value = 659.25;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(this.context.destination);
            
            for (let i = 0; i < 4; i++) {
                gain.gain.setValueAtTime(0.1, now + i * 0.1);
                gain.gain.setValueAtTime(0.01, now + i * 0.1 + 0.05);
            }
            
            osc.start(now);
            osc.stop(now + 0.5);
        },
        
        playDiscoBeat() {
            if (!this.enabled || !this.context) return;
            const now = this.context.currentTime;
            const bass = this.context.createOscillator();
            const bassGain = this.context.createGain();
            bass.type = 'triangle';
            bass.frequency.value = 80;
            bassGain.gain.value = 0.15;
            bass.connect(bassGain);
            bassGain.connect(this.context.destination);
            
            for (let i = 0; i < 4; i++) {
                bassGain.gain.setValueAtTime(0.15, now + i * 0.5);
                bassGain.gain.setValueAtTime(0.01, now + i * 0.5 + 0.1);
            }
            
            bass.start(now);
            bass.stop(now + 2);
        }
    };
    
    AudioSystem.init();

    // ============================================================
    // 生命形态定义
    // ============================================================
    const FORMS = {
        SCHOLAR: 'scholar',
        ARTIST: 'artist',
        POET: 'poet',
        CAT: 'cat',
        DOG: 'dog',
        RABBIT: 'rabbit',
        SQUIRREL: 'squirrel',
        SWALLOW: 'swallow',
        STREAM: 'stream',
        STONE: 'stone',
        CLOUD: 'cloud',
        TREE: 'tree',
        FLOWER: 'flower',
        MOON: 'moon',
        MAHJONG: 'mahjong',
        BEAT: 'beat',
        MELODY: 'melody',
        DISCO: 'disco',
        FAIRY: 'fairy',
        STAR: 'star'
    };

    const formsDatabase = {
        [FORMS.SCHOLAR]: {
            id: FORMS.SCHOLAR, name: '读书人',
            description: '生于书香门第，长于杏花春雨。读书写字，与诗书为伴。',
            baseAttrs: {慧心: 55, 生气: 45, 家境: 40, 怡然: 50, 交游: 45, 文采: 50},
            transform: (old) => ({
                慧心: Math.min(100, (old.慧心||50) + 7),
                生气: Math.min(100, (old.生气||50) + 3),
                家境: Math.min(100, (old.家境||40) + 2),
                怡然: Math.min(100, (old.怡然||50) + 4),
                交游: Math.min(100, (old.交游||45) + 3),
                文采: Math.min(100, (old.文采||45) + 6)
            }), emoji: '📖', unlockCondition: (state) => true
        },
        [FORMS.ARTIST]: {
            id: FORMS.ARTIST, name: '画者',
            description: '以画笔为媒，捕捉光影与色彩。世间万物，皆可入画。',
            baseAttrs: {灵性: 60, 生气: 45, 怡然: 55, 洞察: 50, 耐心: 45},
            transform: (old) => ({
                灵性: Math.min(100, (old.灵性||50) + 8),
                生气: Math.min(100, (old.生气||50) + 3),
                怡然: Math.min(100, (old.怡然||50) + 5),
                洞察: Math.min(100, (old.洞察||45) + 4),
                耐心: Math.min(100, (old.耐心||40) + 3)
            }), emoji: '🎨', unlockCondition: (state) => true
        },
        [FORMS.POET]: {
            id: FORMS.POET, name: '诗人',
            description: '心中藏诗意，笔下生春风。一花一木，皆可成诗。',
            baseAttrs: {灵性: 55, 文采: 60, 怡然: 55, 慧心: 50, 交游: 45},
            transform: (old) => ({
                灵性: Math.min(100, (old.灵性||50) + 7),
                文采: Math.min(100, (old.文采||45) + 7),
                怡然: Math.min(100, (old.怡然||50) + 5),
                慧心: Math.min(100, (old.慧心||50) + 4),
                交游: Math.min(100, (old.交游||45) + 3)
            }), emoji: '🖋️', unlockCondition: (state) => true
        },
        [FORMS.CAT]: {
            id: FORMS.CAT, name: '猫',
            description: '性喜暖阳，善解人意。昼伏夜出，悠然自得。',
            baseAttrs: {灵动: 70, 可爱: 60, 好奇: 65, 温存: 60, 慵懒: 50},
            transform: (human) => ({
                灵动: Math.min(100, (human.生气||50) * 1.2 + 20),
                可爱: Math.min(100, (human.怡然||50) * 1.2 + 15),
                好奇: Math.min(100, (human.慧心||50) * 1.1 + 15),
                温存: Math.min(100, (human.温存||45) * 1.2 + 15),
                慵懒: 50
            }), emoji: '🐱', unlockCondition: (state) => true
        },
        [FORMS.DOG]: {
            id: FORMS.DOG, name: '犬',
            description: '赤诚之心，忠实相伴。奔跑在田野间，追逐阳光。',
            baseAttrs: {生气: 75, 赤诚: 70, 怡然: 75, 温存: 65, 好奇: 55},
            transform: (human) => ({
                生气: Math.min(100, (human.生气||50) * 1.3 + 15),
                赤诚: Math.min(100, (human.交游||45) * 1.3 + 20),
                怡然: Math.min(100, (human.怡然||50) * 1.3 + 15),
                温存: Math.min(100, (human.温存||45) * 1.2 + 15),
                好奇: Math.min(90, (human.好奇||45) * 1.1 + 10)
            }), emoji: '🐶', unlockCondition: (state) => true
        },
        [FORMS.RABBIT]: {
            id: FORMS.RABBIT, name: '兔',
            description: '温柔可人，喜食青草。月下静坐，听风入眠。',
            baseAttrs: {灵动: 65, 可爱: 70, 温良: 60, 温存: 60, 恬淡: 50},
            transform: (human) => ({
                灵动: Math.min(100, (human.生气||50) * 1.2 + 15),
                可爱: Math.min(100, (human.怡然||50) * 1.2 + 20),
                温良: Math.min(90, (human.温良||45) * 1.2 + 10),
                温存: Math.min(90, (human.温存||45) * 1.1 + 15),
                恬淡: 50
            }), emoji: '🐰', unlockCondition: (state) => true
        },
        [FORMS.SQUIRREL]: {
            id: FORMS.SQUIRREL, name: '松鼠',
            description: '灵动于林间，收集秋日果实。忙碌而自在，与松果为伴。',
            baseAttrs: {灵动: 75, 机敏: 65, 勤勉: 60, 怡然: 65, 好奇: 55},
            transform: (human) => ({
                灵动: Math.min(100, (human.生气||50) * 1.3 + 15),
                机敏: Math.min(100, (human.慧心||50) * 1.2 + 15),
                勤勉: Math.min(95, (human.勤勉||40) * 1.2 + 15),
                怡然: Math.min(95, (human.怡然||50) * 1.1 + 15),
                好奇: Math.min(90, (human.好奇||45) * 1.1 + 10)
            }), emoji: '🐿️', unlockCondition: (state) => true
        },

            { text: '听他许愿', attr: '温存', difficulty: 8, success: '希望他的愿望成真，温存+2', gainExp: 6, attrs: {温存:2} },
            { text: '眨眨眼', attr: '可爱', difficulty: 6, success: '他看到你眨眼，笑了，可爱+2', gainExp: 4, attrs: {可爱:2} }
          ], failAttrs: {} },
        { id: 'st3', form: FORMS.STAR, year: 3,
          title: '指路',
          desc: '有个迷路的人，看着你找到了方向。',
          paths: [
            { text: '照亮前路', attr: '光芒', difficulty: 12, success: '他安全到家了，光芒+2', gainExp: 10, attrs: {光芒:2} },
            { text: '默默陪伴', attr: '温柔', difficulty: 8, success: '陪他走完夜路，温柔+2', gainExp: 6, attrs: {温柔:2} }
          ], failAttrs: {} },
        { id: 'st4', form: FORMS.STAR, year: 4,
          title: '星座',
          desc: '你和周围的星星连成了一个星座。',
          paths: [
            { text: '成为图案', attr: '优雅', difficulty: 10, success: '真美啊，优雅+2', gainExp: 8, attrs: {优雅:2} },
            { text: '保持独立', attr: '独立', difficulty: 8, success: '还是喜欢独自闪烁，独立+2', gainExp: 6, attrs: {独立:2} }
          ], failAttrs: {} },
        { id: 'st5', form: FORMS.STAR, year: 5,
          title: '流星',
          desc: '一颗流星划过，你也要去吗？',
          paths: [
            { text: '划过天际', attr: '光芒', difficulty: 14, success: '成为最美的流星，光芒+2', gainExp: 12, attrs: {光芒:2} },
            { text: '留在原位', attr: '永恒', difficulty: 10, success: '还是在这里静静闪烁，永恒+2', gainExp: 8, attrs: {永恒:2} }
          ], failAttrs: {} },
        { id: 'st6', form: FORMS.STAR, year: 10,
          title: '永恒',
          desc: '你已经在夜空挂了很久很久，还会一直挂下去。',
          paths: [
            { text: '继续闪烁', attr: '永恒', difficulty: 12, success: '永远在这里，永恒+2', gainExp: 10, attrs: {永恒:2} },
            { text: '祝福人间', attr: '希望', difficulty: 8, success: '愿人间永远美好，希望+2', gainExp: 6, attrs: {希望:2} }
          ], failAttrs: {} }
    ];

    // ============================================================
    // 游戏状态
    // ============================================================
    let gameState = {
        currentForm: null,
        attrs: {},
        memories: [],
        exp: 50,
        timeline: [],
        currentYear: 0,
        storyCount: 0,
        pendingDice: null,
        showingNewLife: false,
        selectedForm: null,
        newLifeOptions: [],
        gameEnded: false,
        endingMessage: null,
        notification: null,
        showWelcome: true,
        usedStories: [],
        audioEnabled: false
    };

    // ============================================================
    // 幸运骰子系统
    // ============================================================
    function rollDice() {
        return Math.floor(Math.random() * 20) + 1;
    }

    function getDiceBonus(attrName, state) {
        let bonus = 0;
        state.memories.forEach(id => {
            const memories = memoriesDatabase[state.currentForm] || [];
            const memory = memories.find(m => m.id === id);
            if (memory && memory.diceBonus) {
                if (memory.diceBonus[attrName]) {
                    bonus += memory.diceBonus[attrName];
                }
            }
        });
        return bonus;
    }

    function getDifficultyReduce(attrName, state) {
        let reduce = 0;
        state.memories.forEach(id => {
            const memories = memoriesDatabase[state.currentForm] || [];
            const memory = memories.find(m => m.id === id);
            if (memory && memory.difficultyReduce && memory.difficultyReduce[attrName]) {
                reduce += memory.difficultyReduce[attrName];
            }
        });
        return reduce;
    }

    function tryGetMemory() {
        if (Math.random() > 0.2) return false;
        const memories = memoriesDatabase[gameState.currentForm] || [];
        if (memories.length === 0) return false;
        const notYet = memories.filter(m => !gameState.memories.includes(m.id));
        if (notYet.length === 0) return false;
        const memory = notYet[Math.floor(Math.random() * notYet.length)];
        gameState.memories.push(memory.id);
        if (memory.effect) {
            gameState.attrs = applyAttrChanges(gameState.attrs, memory.effect);
        }
        if (gameState.audioEnabled) AudioSystem.playMemory();
        gameState.notification = `✨ 忆起「${memory.name}」`;
        setTimeout(() => {
            gameState.notification = null;
            render();
        }, 3000);
        return true;
    }

    function resolveDiceCheck(attrName, baseDifficulty, state) {
        let dice = rollDice();
        let bonus = getDiceBonus(attrName, state);
        let difficulty = baseDifficulty - getDifficultyReduce(attrName, state);
        return {
            dice: dice,
            finalDice: dice,
            bonus: bonus,
            difficulty: Math.max(1, difficulty),
            success: (dice + bonus) >= Math.max(1, difficulty),
            lucky: dice === 20,
            unlucky: dice === 1
        };
    }

    // ============================================================
    // 核心逻辑
    // ============================================================
    function enableAudio() {
        gameState.audioEnabled = true;
        AudioSystem.enable();
        render();
    }

    function startNewGame(formId) {
        const form = formsDatabase[formId];
        if (!form) return;
        
        gameState.currentForm = formId;
        gameState.attrs = { ...form.baseAttrs };
        gameState.memories = [];
        gameState.timeline = [];
        gameState.storyCount = 0;
        gameState.showWelcome = false;
        gameState.showingNewLife = false;
        gameState.gameEnded = false;
        gameState.exp = 50;
        gameState.usedStories = [];
        
        render();
    }

    function handleChoice(choiceIdx) {
        if (gameState.showingNewLife || gameState.gameEnded || gameState.showWelcome) return;
        
        const currentStory = getCurrentStory();
        if (!currentStory) {
            showNewLifeOptions();
            return;
        }
        
        const path = currentStory.paths[choiceIdx];
        if (!path) return;

        if (gameState.audioEnabled) AudioSystem.playDiceRoll();
        const diceResult = resolveDiceCheck(path.attr, path.difficulty, gameState);
        const isSuccess = diceResult.success;
        const beforeAttrs = copyAttrs(gameState.attrs);

        let resultText = '';
        let expGain = 0;
        let attrChanges = {};

        if (isSuccess) {
            resultText = path.success || '成功！';
            expGain = path.gainExp || 10;
            attrChanges = path.attrs || {};
            if (diceResult.lucky) {
                if (gameState.audioEnabled) AudioSystem.playLucky();
                resultText = '✨ 大吉！' + resultText;
            } else {
                if (gameState.audioEnabled) AudioSystem.playSuccess();
            }
        } else {
            resultText = currentStory.failText || '下次会更好';
            expGain = 0;
            attrChanges = currentStory.failAttrs || {};
        }

        gameState.attrs = applyAttrChanges(gameState.attrs, attrChanges);
        gameState.exp += expGain;
        gameState.storyCount += 1;
        gameState.currentYear = currentStory.year;

        tryGetMemory();

        if (!gameState.usedStories) gameState.usedStories = [];
        gameState.usedStories.push(currentStory.id);

        gameState.timeline.push({
            storyId: currentStory.id,
            storyTitle: currentStory.title,
            year: currentStory.year,
            path: path.text,
            diceResult: diceResult.finalDice,
            diceBonus: diceResult.bonus,
            difficulty: diceResult.difficulty,
            success: isSuccess,
            lucky: diceResult.lucky,
            attrsBefore: beforeAttrs,
            attrsAfter: copyAttrs(gameState.attrs),
            expGain: expGain
        });

        gameState.pendingDice = {
            dice: diceResult.dice,
            finalDice: diceResult.finalDice,
            bonus: diceResult.bonus,
            total: diceResult.finalDice + diceResult.bonus,
            difficulty: diceResult.difficulty,
            success: isSuccess,
            text: resultText,
            exp: expGain,
            lucky: diceResult.lucky
        };

        // 检查是否还有未使用的故事
        const allStories = lifeStories.filter(s => s.form === gameState.currentForm);
        const unusedStories = allStories.filter(s => !gameState.usedStories?.includes(s.id));
        
        if (unusedStories.length === 0 && !gameState.gameEnded) {
            showNewLifeOptions();
        }

        render();
    }

    function showNewLifeOptions() {
        let options = [];
        for (let f in formsDatabase) {
            if (f === gameState.currentForm) continue;
            const form = formsDatabase[f];
            let available = true;
            if (form.unlockCondition) {
                available = form.unlockCondition(gameState);
            }
            options.push({
                formId: f,
                name: form.name,
                desc: form.description,
                available: available,
                emoji: form.emoji
            });
        }
        gameState.newLifeOptions = options;
        gameState.showingNewLife = true;
        render();
    }

    function startNewLife(formId) {
        const target = formsDatabase[formId];
        if (!target) return;
        
        gameState.currentForm = formId;
        gameState.attrs = target.transform(gameState.attrs);
        gameState.currentYear = 0;
        gameState.showingNewLife = false;
        gameState.storyCount = 0;
        gameState.memories = [];
        gameState.usedStories = [];
        gameState.gameEnded = false;
        
        gameState.timeline.push({
            storyId: 'NEW_LIFE',
            storyTitle: `✨ 新生：化为${target.name}`,
            year: 0,
            path: '新生',
            success: true,
            attrsBefore: null,
            attrsAfter: copyAttrs(gameState.attrs),
            expGain: 0
        });
        
        render();
    }

    function lookBack(index) {
        if (index < 0 || index >= gameState.timeline.length || gameState.gameEnded || gameState.showWelcome) return;
        if (gameState.exp < 15) {
            alert('阅历不足');
            return;
        }
        gameState.exp -= 15;
        gameState.attrs = copyAttrs(gameState.timeline[index].attrsBefore);
        gameState.timeline = gameState.timeline.slice(0, index);
        gameState.storyCount = gameState.timeline.filter(t => t.storyId !== 'NEW_LIFE').length;
        gameState.usedStories = gameState.timeline.map(t => t.storyId).filter(id => id !== 'NEW_LIFE');
        gameState.showingNewLife = false;
        gameState.gameEnded = false;
        render();
    }

    // ============================================================
    // 辅助函数
    // ============================================================
    function copyAttrs(attrs) {
        return {...attrs};
    }

    function applyAttrChanges(attrs, changes) {
        if (!changes) return attrs;
        let newAttrs = {...attrs};
        for (let [k, v] of Object.entries(changes)) {
            newAttrs[k] = Math.min(100, Math.max(0, (newAttrs[k] || 0) + v));
        }
        return newAttrs;
    }

    function getCurrentStory() {
        if (gameState.showingNewLife || gameState.gameEnded || gameState.showWelcome) return null;
        
        const stories = lifeStories.filter(s => s.form === gameState.currentForm);
        if (stories.length === 0) return null;
        
        const unusedStories = stories.filter(s => !gameState.usedStories?.includes(s.id));
        if (unusedStories.length === 0) return null;
        
        unusedStories.sort((a, b) => a.year - b.year);
        return unusedStories[0];
    }

    // ============================================================
    // 渲染 - 按分类显示
    // ============================================================
    function render() {
        const root = document.getElementById('gameRoot');
        if (!root) return;

        let html = '';

        if (gameState.notification) {
            html += `<div class="notification">${gameState.notification}</div>`;
        }

        if (gameState.showWelcome) {
            html += renderWelcome();
        } else {
            const formData = formsDatabase[gameState.currentForm];
            const formName = formData?.name || '';
            const expPercent = Math.min(100, (gameState.exp / 100) * 100);

            html += `
                <div class="header">
                    <span class="badge">${formName}</span>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="color:#ffff00;">✨${gameState.exp}</span>
                        <div class="exp-bar"><div class="exp-fill" style="width: ${expPercent}%;"></div></div>
                        ${!gameState.audioEnabled ? 
                            '<button class="secondary" style="padding:4px 12px; font-size:10px;" onclick="window.__enableAudio()">🔊 开启DISCO</button>' : 
                            '<span style="color:#00ffff;">🎵 DISCO ON</span>'}
                    </div>
                </div>
            `;

            html += `<div class="stats-panel">`;
            html += `<div class="attrs-panel">`;
            for (let [key, value] of Object.entries(gameState.attrs)) {
                html += `<div class="attr-item"><span class="attr-name">${key}</span><span class="attr-value">${value}</span></div>`;
            }
            html += `</div>`;
            
            html += `
                <div class="memory-panel">
                    <div><span class="memory-icon">✨</span> <span class="memory-count">${gameState.memories.length}</span></div>
                    <div style="font-size:8px; color:#ffff00;">忆念</div>
                </div>
            `;
            html += `</div>`;

            html += `
                <div class="dice-panel">
                    <span class="dice-icon">🎲</span>
                    <span>掷出你的命运</span>
                    <span class="dice-bonus">+${gameState.memories.length}</span>
                </div>
            `;

            if (gameState.timeline.length > 0 && !gameState.gameEnded) {
                html += `<div class="timeline">`;
                gameState.timeline.forEach((node, idx) => {
                    let cls = 'timeline-dot';
                    if (node.lucky) cls += ' lucky';
                    else if (node.success) cls += ' success';
                    else cls += ' failure';
                    html += `<div class="${cls}" onclick="window.__lookBack(${idx})">${idx+1}</div>`;
                });
                html += `</div>`;
            }

            if (gameState.gameEnded) {
                html += renderEnding();
            } else if (gameState.showingNewLife) {
                html += renderNewLife();
            } else {
                html += renderStory();
            }
        }

        root.innerHTML = html;
        bindEvents();
    }

    function renderWelcome() {
        // 按类别分组
        const categories = [
            {
                name: '📚 人间世',
                forms: [FORMS.SCHOLAR, FORMS.ARTIST, FORMS.POET]
            },
            {
                name: '🐾 生灵',
                forms: [FORMS.CAT, FORMS.DOG, FORMS.RABBIT, FORMS.SQUIRREL, FORMS.SWALLOW]
            },
            {
                name: '🌿 自然',
                forms: [FORMS.STREAM, FORMS.STONE, FORMS.CLOUD, FORMS.TREE, FORMS.FLOWER, FORMS.MOON]
            },
            {
                name: '🎵 音律',
                forms: [FORMS.BEAT, FORMS.MELODY, FORMS.DISCO]
            },
            {
                name: '🀄 器物',
                forms: [FORMS.MAHJONG]
            },
            {
                name: '✨ 灵幻',
                forms: [FORMS.FAIRY, FORMS.STAR]
            }
        ];

        let html = `
            <div class="welcome-screen">
                <div class="welcome-title">PIXEL LIFE</div>
                <div class="welcome-subtitle">SELECT YOUR FORM</div>
        `;

        // 遍历每个分类
        categories.forEach(category => {
            html += `<div class="category-title">${category.name}</div>`;
            html += `<div class="memory-grid">`;
            
            category.forms.forEach(formId => {
                const form = formsDatabase[formId];
                if (form) {
                    html += `
                        <div class="memory-card" data-form="${formId}" style="cursor: pointer;">
                            <div class="emoji">${form.emoji}</div>
                            <div class="name">${form.name}</div>
                            <div class="desc">${form.description.substring(0, 30)}...</div>
                        </div>
                    `;
                }
            });
            
            html += `</div>`; // 结束 grid
        });

        html += `</div>`; // 结束 welcome-screen
        if (!gameState.audioEnabled) {
            html += `<button class="primary" onclick="window.__enableAudio()" style="margin-top: 20px;">🎵 开启DISCO</button>`;
        }
        html += `</div>`;
        return html;
    }

    function renderStory() {
        const currentStory = getCurrentStory();
        if (!currentStory) {
            return `<div class="story-card">🌱 故事已尽，可开启新程</div>`;
        }

        let html = `
            <div class="story-card">
                <div class="story-title">${currentStory.title}</div>
                <div class="story-desc">${currentStory.desc}</div>
                <div class="choices-area">
        `;
        
        currentStory.paths.forEach((path, idx) => {
            html += `
                <button class="choice-btn" data-choice-index="${idx}">
                    ${path.text}
                </button>
            `;
        });
        
        html += `</div>`;

        if (gameState.pendingDice) {
            let luckyText = '';
            if (gameState.pendingDice.lucky) luckyText = '✨ LUCKY!';
            
            html += `
                <div class="dice-result">
                    <div>🎲 ${gameState.pendingDice.finalDice} + ${gameState.pendingDice.bonus}</div>
                    <div class="dice-number">${gameState.pendingDice.total}</div>
                    <div>NEED ${gameState.pendingDice.difficulty}</div>
                    <div style="font-size:14px; margin-top: 8px;">${luckyText} ${gameState.pendingDice.text}</div>
                    <div style="margin-top: 4px;">${gameState.pendingDice.exp > 0 ? '+' + gameState.pendingDice.exp + 'exp' : ''}</div>
                </div>
            `;
            
            setTimeout(() => {
                gameState.pendingDice = null;
                render();
            }, 3000);
        }

        html += `</div>`;
        return html;
    }

    function renderNewLife() {
        let html = `
            <div class="memory-screen">
                <h2 style="color:#ffff00; font-size:16px; margin-top:0;">✨ NEW LIFE ✨</h2>
                <p style="color:#00ffff; font-size:10px;">Choose your next form</p>
                <div class="memory-grid">
        `;

        gameState.newLifeOptions.forEach(opt => {
            let cardClass = 'memory-card';
            if (!opt.available) cardClass += ' locked';
            if (gameState.selectedForm === opt.formId) cardClass += ' selected';

            html += `
                <div class="${cardClass}" data-form="${opt.formId}" style="cursor: pointer;">
                    <div class="emoji">${opt.emoji}</div>
                    <div class="name">${opt.name}</div>
                    <div class="desc">${opt.desc.substring(0, 25)}...</div>
                    ${!opt.available ? '<div style="color:#ff00ff; font-size:8px; margin-top:4px;">🔒 LOCKED</div>' : ''}
                </div>
            `;
        });

        html += `</div>`;
        html += `<button class="primary" id="confirmNewLifeBtn" ${gameState.selectedForm ? '' : 'disabled'}>🌸 新生</button>`;
        html += `<button class="secondary" onclick="window.__hideNewLife()">⏳ 稍后</button>`;
        html += `</div>`;
        return html;
    }

    function renderEnding() {
        return `
            <div class="story-card" style="text-align: center;">
                <div class="story-title" style="color: #ff00ff;">✨ GAME OVER ✨</div>
                <div class="dice-result" style="border-color: #ff00ff;">
                    ${gameState.endingMessage || 'See you next time!'}
                </div>
                <button class="primary" onclick="location.reload()">🌸 RESTART</button>
            </div>
        `;
    }

    // ============================================================
    // 事件绑定
    // ============================================================
    function bindEvents() {
        document.querySelectorAll('[data-form]').forEach(card => {
            card.addEventListener('click', (e) => {
                const formId = card.dataset.form;
                if (gameState.showWelcome) {
                    startNewGame(formId);
                } else {
                    const opt = gameState.newLifeOptions?.find(o => o.formId === formId);
                    if (opt && opt.available) {
                        gameState.selectedForm = formId;
                        render();
                    }
                }
            });
        });

        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = e.currentTarget.dataset.choiceIndex;
                if (idx !== undefined) handleChoice(parseInt(idx));
            });
        });

        const confirmBtn = document.getElementById('confirmNewLifeBtn');
        if (confirmBtn) {
            confirmBtn.addEventListener('click', () => {
                if (gameState.selectedForm) {
                    startNewLife(gameState.selectedForm);
                }
            });
        }
    }

    // 全局函数
    window.__hideNewLife = function() {
        gameState.showingNewLife = false;
        render();
    };

    window.__lookBack = function(index) {
        lookBack(index);
    };

    window.__enableAudio = function() {
        enableAudio();
    };

    // 启动
    render();
})();
</script>
</body>
</html>
