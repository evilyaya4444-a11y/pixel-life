<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命诗·万物有灵</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            background: #1a0f2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 0, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 1;
        }
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, #1a0f2a 100%);
            pointer-events: none;
            z-index: 1;
        }
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #2a1a3a;
            border: 4px solid #ff00ff;
            box-shadow: 0 0 0 4px #00ffff, 0 0 20px #ff00ff;
            padding: 24px;
            position: relative;
            z-index: 2;
            image-rendering: pixelated;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #1a0f2a;
            border: 4px solid #00ffff;
            margin-bottom: 24px;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff00ff;
        }
        .badge {
            background: #ff00ff;
            color: #ffff00;
            padding: 8px 16px;
            border: 2px solid #00ffff;
            font-size: 12px;
            text-shadow: 1px 1px 0 #000000;
        }
        .exp-bar {
            background: #1a0f2a;
            height: 16px;
            width: 140px;
            border: 2px solid #00ffff;
            position: relative;
        }
        .exp-fill {
            height: 100%;
            width: 0%;
            background: #ffff00;
            box-shadow: 0 0 10px #ffff00;
            transition: width 0.3s steps(10);
        }
        .stats-panel {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .attrs-panel {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: #1a0f2a;
            border: 4px solid #ff00ff;
            padding: 16px;
        }
        .memory-panel {
            flex: 1;
            min-width: 100px;
            background: #1a0f2a;
            border: 4px solid #00ffff;
            padding: 16px;
            text-align: center;
            position: relative;
        }
        .memory-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, #ff00ff22, #00ffff22 8px);
            pointer-events: none;
        }
        .attr-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a1a3a;
            padding: 8px;
            border: 2px solid #00ffff;
        }
        .attr-name {
            color: #ffff00;
            font-size: 10px;
            width: 45px;
            text-shadow: 1px 1px 0 #ff00ff;
        }
        .attr-value {
            color: #00ffff;
            font-size: 12px;
            background: #1a0f2a;
            padding: 4px 8px;
            border: 2px solid #ff00ff;
            text-shadow: 1px 1px 0 #ffff00;
        }
        .memory-icon {
            font-size: 20px;
        }
        .memory-count {
            font-size: 20px;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff00ff;
        }
        .dice-panel {
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #00ffff;
            text-shadow: 1px 1px 0 #ff00ff;
        }
        .dice-icon {
            font-size: 24px;
            filter: drop-shadow(0 0 5px #ff00ff);
        }
        .dice-bonus {
            color: #ffff00;
            font-size: 16px;
        }
        .story-card {
            background: #1a0f2a;
            border: 4px solid #ff00ff;
            padding: 32px;
            margin: 20px 0;
            position: relative;
            box-shadow: 8px 8px 0 #00ffff;
        }
        .story-title {
            font-size: 20px;
            color: #ffff00;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #ff00ff;
            line-height: 1.5;
        }
        .story-desc {
            color: #00ffff;
            margin-bottom: 28px;
            font-size: 12px;
            line-height: 1.8;
            padding: 16px;
            background: #2a1a3a;
            border: 2px solid #ffff00;
        }
        .choices-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .choice-btn {
            background: #2a1a3a;
            border: 4px solid #00ffff;
            color: #ffff00;
            padding: 16px;
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 #ff00ff;
            text-shadow: 1px 1px 0 #000000;
            line-height: 1.5;
        }
        .choice-btn:hover {
            background: #3a2a4a;
            border-color: #ffff00;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ff00ff;
        }
        .choice-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #ff00ff;
        }
        .dice-result {
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 20px;
            margin-top: 24px;
            color: #00ffff;
            font-size: 12px;
            text-align: center;
            animation: pixelDice 0.3s steps(5);
        }
        @keyframes pixelDice {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            50% { transform: scale(1.1); filter: hue-rotate(90deg); }
            100% { transform: scale(1); filter: hue-rotate(0deg); }
        }
        .dice-number {
            font-size: 48px;
            color: #ffff00;
            text-shadow: 4px 4px 0 #ff00ff;
            margin: 10px 0;
        }
        .timeline {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 16px 0;
            margin: 10px 0;
        }
        .timeline-dot {
            min-width: 40px;
            height: 40px;
            background: #1a0f2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #ffff00;
            border: 2px solid #ff00ff;
            cursor: pointer;
            image-rendering: pixelated;
        }
        .timeline-dot.lucky {
            background: #ffff00;
            color: #ff00ff;
            border-color: #00ffff;
        }
        .timeline-dot.success {
            background: #00ffff;
            color: #ff00ff;
            border-color: #ffff00;
        }
        .timeline-dot.failure {
            background: #ff00ff;
            color: #ffff00;
            border-color: #00ffff;
        }
        .memory-screen {
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 24px;
            margin: 20px 0;
        }
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin: 24px 0;
            max-height: 600px;
            overflow-y: auto;
            padding: 12px;
        }
        .memory-card {
            background: #2a1a3a;
            border: 4px solid #00ffff;
            padding: 20px 12px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 4px 4px 0 #ff00ff;
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .memory-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ff00ff;
            border-color: #ffff00;
        }
        .memory-card.selected {
            border-color: #ffff00;
            background: #3a2a4a;
            box-shadow: 0 0 0 2px #ffff00;
        }
        .memory-card.locked {
            opacity: 0.5;
            border-color: #666;
            cursor: not-allowed;
        }
        .memory-card.locked:hover {
            transform: none;
            box-shadow: 4px 4px 0 #ff00ff;
        }
        .memory-card .emoji {
            font-size: 36px;
            margin-bottom: 12px;
        }
        .memory-card .name {
            font-size: 12px;
            color: #ffff00;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .memory-card .desc {
            font-size: 8px;
            color: #00ffff;
            line-height: 1.4;
        }
        button.primary {
            background: #ff00ff;
            border: none;
            color: #ffff00;
            padding: 16px 32px;
            font-size: 14px;
            cursor: pointer;
            border: 4px solid #00ffff;
            box-shadow: 4px 4px 0 #ffff00;
            text-shadow: 2px 2px 0 #000000;
            margin: 10px 5px;
        }
        button.primary:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ffff00;
        }
        button.primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button.secondary {
            background: #00ffff;
            border: none;
            color: #ff00ff;
            padding: 16px 32px;
            font-size: 14px;
            cursor: pointer;
            border: 4px solid #ffff00;
            box-shadow: 4px 4px 0 #ff00ff;
            text-shadow: 2px 2px 0 #000000;
        }
        button.secondary:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ff00ff;
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a0f2a;
            border: 4px solid #ffff00;
            padding: 16px 32px;
            color: #00ffff;
            z-index: 1000;
            animation: slideDown 0.5s steps(10);
            text-shadow: 1px 1px 0 #ff00ff;
            box-shadow: 8px 8px 0 #ff00ff;
            font-size: 12px;
        }
        @keyframes slideDown {
            0% { top: -100px; opacity: 0; }
            100% { top: 20px; opacity: 1; }
        }
        .welcome-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .welcome-title {
            font-size: 32px;
            color: #ffff00;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 #ff00ff, 8px 8px 0 #00ffff;
            line-height: 1.5;
        }
        .welcome-subtitle {
            font-size: 14px;
            color: #00ffff;
            margin-bottom: 48px;
            text-shadow: 2px 2px 0 #ff00ff;
        }
        .disco-light {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                #ff00ff22,
                #00ffff22 20px,
                #ffff0022 40px
            );
            animation: discoMove 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes discoMove {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }
    </style>
</head>
<body>
    <div class="disco-light"></div>
    <div class="game-container" id="gameRoot"></div>
